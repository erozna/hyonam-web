<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hyonam.com | AI Guitar Muse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .hero-bg { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)), url('https://source.unsplash.com/random/1920x1080/?classical-guitar') center/cover no-repeat; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
  <!-- 헤더 -->
  <header class="border-b border-zinc-800 bg-zinc-950 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="text-2xl font-bold text-amber-400">AI Guitar Muse</div>
      <nav class="flex gap-8">
        <a href="#" class="hover:text-amber-400">Home</a>
        <a href="#" class="hover:text-amber-400">AI 편곡 도구</a>
        <a href="#" class="hover:text-amber-400">About</a>
        <a href="#" class="hover:text-amber-400">Contact</a>
      </nav>
    </div>
  </header>

  <!-- 히어로 -->
  <section class="hero-bg h-screen flex items-center">
    <div class="max-w-7xl mx-auto px-6 text-center">
      <h1 class="text-6xl md:text-7xl font-bold mb-6">클래식 기타 편곡,<br>AI가 1분 만에 해드립니다</h1>
      <p class="text-2xl text-zinc-400 mb-10">연주자이자 교수인 당신을 위한 스마트 AI 도우미</p>
      <button onclick="alert('AI 편곡 데모 시작! (실제 연동 예정)')" 
              class="bg-amber-500 hover:bg-amber-600 text-black font-semibold px-10 py-4 rounded-full text-xl transition">
        지금 바로 편곡 시작하기
      </button>
    </div>
  </section>

  <!-- 기능 카드 -->
  <section class="py-20 bg-zinc-900">
    <div class="max-w-7xl mx-auto px-6">
      <h2 class="text-4xl font-bold text-center mb-12">AI가 해주는 기타 편곡 6단계</h2>
      <div class="grid md:grid-cols-3 gap-8">
        <div class="bg-zinc-800 p-8 rounded-2xl">1. 연주 녹음 업로드 → 자동 TAB 생성</div>
        <div class="bg-zinc-800 p-8 rounded-2xl">2. 멜로디만 주면 fingerstyle 편곡 완성</div>
        <div class="bg-zinc-800 p-8 rounded-2xl">3. MusicXML / PDF 즉시 출력</div>
        <!-- 추가 카드 3개 더 필요하면 말씀해주세요 -->
      </div>
    </div>
  </section>

  <!-- 푸터 -->
  <footer class="bg-black py-12 text-center text-zinc-500">
    <p>© 2026 hyonam.com | Powered by DOKKEBI OS & Grok</p>
    <p class="mt-2">클래식 기타를 위한 AI 연구 & 교육 플랫폼</p>
  </footer>
</body>
</html>
