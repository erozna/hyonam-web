name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy assets to deploy folder
        run: |
          mkdir -p deploy
          cp index.html deploy/
          cp script.js deploy/ 2>/dev/null || true
          cp style.css deploy/ 2>/dev/null || true
          cp -r public/slide_*.jpg deploy/ 2>/dev/null || true
          cp public/도깨비마인드맵.png deploy/ 2>/dev/null || true
          cp public/*.pdf deploy/ 2>/dev/null || true
          echo "hyonam.com" > deploy/CNAME

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          force_orphan: true
